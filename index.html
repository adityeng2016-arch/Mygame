<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
min-height:100vh;
padding:20px;
}

h1{
margin-top:10px;
font-size:35px;
}

.modeBtn,.resetBtn{
padding:12px 20px;
border:none;
border-radius:12px;
margin:10px;
font-size:16px;
cursor:pointer;
}

.modeBtn{
background:#22c55e;
color:white;
}

.resetBtn{
background:#3b82f6;
color:white;
}

.scoreBox{
margin:15px auto;
padding:15px;
background:#1e293b;
width:280px;
border-radius:15px;
font-size:20px;
}

#status{
margin:15px;
font-size:22px;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
margin:20px auto;
}

.cell{
width:100px;
height:100px;
background:#111827;
border:2px solid #334155;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
cursor:pointer;
transition:.3s;
}

.cell:hover{
transform:scale(1.05);
}

.win{
background:#22c55e !important;
}

@media(max-width:500px){
.board{
grid-template-columns:repeat(3,85px);
}
.cell{
width:85px;
height:85px;
}
}
</style>
</head>

<body>

<h1>🎮 Tic Tac Toe Pro</h1>

<button class="modeBtn" onclick="toggleMode()">
Mode: 2 Players
</button>

<h2 id="status">Player X Turn</h2>

<div class="scoreBox">
X Score: <span id="xScore">0</span>
|
O Score: <span id="oScore">0</span>
</div>

<div class="board">
<div class="cell" onclick="move(0)"></div>
<div class="cell" onclick="move(1)"></div>
<div class="cell" onclick="move(2)"></div>
<div class="cell" onclick="move(3)"></div>
<div class="cell" onclick="move(4)"></div>
<div class="cell" onclick="move(5)"></div>
<div class="cell" onclick="move(6)"></div>
<div class="cell" onclick="move(7)"></div>
<div class="cell" onclick="move(8)"></div>
</div>

<button class="resetBtn" onclick="resetGame()">
New Game
</button>

<script>

let board=["","","","","","","","",""];
let current="X";
let gameOver=false;
let xScore=0;
let oScore=0;
let aiMode=false;

const winPatterns=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function toggleMode(){
aiMode=!aiMode;

document.querySelector(".modeBtn").innerText=
aiMode ? "Mode: AI" : "Mode: 2 Players";

resetGame();
}

function move(i){

if(board[i]!==""||gameOver) return;

board[i]=current;

document.getElementsByClassName("cell")[i]
.innerText=current;

let winData=checkWin();

if(winData){

for(let index of winData){
document.getElementsByClassName("cell")[index]
.classList.add("win");
}

document.getElementById("status").innerText=
current+" Wins!";

if(current==="X"){
xScore++;
document.getElementById("xScore").innerText=xScore;
}else{
oScore++;
document.getElementById("oScore").innerText=oScore;
}

gameOver=true;
return;
}

if(!board.includes("")){
document.getElementById("status").innerText=
"Draw!";
gameOver=true;
return;
}

current=current==="X"?"O":"X";

document.getElementById("status").innerText=
"Player "+current+" Turn";

if(aiMode && current==="O" && !gameOver){
setTimeout(aiMove,500);
}
}

function aiMove(){

let empty=[];

for(let i=0;i<board.length;i++){
if(board[i]==="") empty.push(i);
}

if(empty.length===0) return;

let random=
empty[Math.floor(Math.random()*empty.length)];

move(random);
}

function checkWin(){

for(let pattern of winPatterns){

if(
board[pattern[0]] &&
board[pattern[0]]===board[pattern[1]] &&
board[pattern[1]]===board[pattern[2]]
){
return pattern;
}
}

return null;
}

function resetGame(){

board=["","","","","","","","",""];
current="X";
gameOver=false;

document.getElementById("status").innerText=
"Player X Turn";

let cells=document.getElementsByClassName("cell");

for(let c of cells){
c.innerText="";
c.classList.remove("win");
}
}
</script>

</body>
</html>
