<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch The Coin</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#1e3c72;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

#score{
    font-size:28px;
    margin:15px;
}

#gameArea{
    position:relative;
    width:100%;
    height:70vh;
    overflow:hidden;
}

#coin{
    position:absolute;
    width:70px;
    height:70px;
    background:gold;
    border-radius:50%;
    cursor:pointer;
    box-shadow:0 0 15px yellow;
}
</style>
</head>

<body>

<h1>💰 Catch The Coin</h1>
<div id="score">Score: 0</div>

<div id="gameArea">
    <div id="coin"></div>
</div>

<script>
let score = 0;
const coin = document.getElementById("coin");
const scoreText = document.getElementById("score");

function moveCoin(){
    const areaWidth = window.innerWidth - 80;
    const areaHeight = window.innerHeight * 0.7 - 80;

    const x = Math.random() * areaWidth;
    const y = Math.random() * areaHeight;

    coin.style.left = x + "px";
    coin.style.top = y + "px";
}

coin.addEventListener("click", () => {
    score++;
    scoreText.innerHTML = "Score: " + score;
    moveCoin();
});

moveCoin();
</script>

</body>
</html>
